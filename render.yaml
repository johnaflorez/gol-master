databases:
  - name: gol-master-db
    databaseName: gol_master
    user: gol_master_user
    plan: free

services:
  - type: web
    name: gol-master
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gol-master-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "gol-master.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"

