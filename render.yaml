services:
  - type: web
    name: gol-master
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "mkdir -p /tmp/media && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: MEDIA_ROOT
        value: "/tmp/media"
      - key: SERVE_MEDIA
        value: "True"
      - key: USE_S3_MEDIA
        value: "True"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_REGION_NAME
        value: "us-east-1"
      - key: AWS_S3_SIGNATURE_VERSION
        value: "s3v4"
      - key: AWS_S3_ADDRESSING_STYLE
        value: "path"
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false
      - key: AWS_S3_URL_PROTOCOL
        value: "https:"
      - key: AWS_QUERYSTRING_AUTH
        value: "False"
      - key: MEDIA_URL
        sync: false
      - key: FOOTBALL_DATA_TOKEN
        sync: false
      - key: FOOTBALL_DATA_BASE_URL
        value: "https://api.football-data.org/v4"
      - key: FOOTBALL_DATA_TIMEOUT
        value: "15"

  - type: worker
    name: gol-master-celery-worker
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker --loglevel=info --concurrency=1"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FOOTBALL_DATA_TOKEN
        sync: false
      - key: FOOTBALL_DATA_BASE_URL
        value: "https://api.football-data.org/v4"
      - key: FOOTBALL_DATA_TIMEOUT
        value: "15"
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: gol-master-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: gol-master-redis
          property: connectionString

  - type: worker
    name: gol-master-celery-beat
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config beat --loglevel=info"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FOOTBALL_DATA_TOKEN
        sync: false
      - key: FOOTBALL_DATA_BASE_URL
        value: "https://api.football-data.org/v4"
      - key: FOOTBALL_DATA_TIMEOUT
        value: "15"
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: gol-master-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: gol-master-redis
          property: connectionString

  - type: redis
    name: gol-master-redis
    ipAllowList: []

