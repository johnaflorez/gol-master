services:
  - type: web
    name: gol-master
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "mkdir -p /tmp/media && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: MEDIA_ROOT
        value: "/tmp/media"
      - key: SERVE_MEDIA
        value: "True"
      - key: USE_S3_MEDIA
        value: "True"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_REGION_NAME
        value: "us-east-1"
      - key: AWS_S3_SIGNATURE_VERSION
        value: "s3v4"
      - key: AWS_S3_ADDRESSING_STYLE
        value: "path"
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false
      - key: AWS_S3_URL_PROTOCOL
        value: "https:"
      - key: AWS_QUERYSTRING_AUTH
        value: "False"
      - key: MEDIA_URL
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: API_FOOTBALL_BASE_URL
        value: "https://v3.football.api-sports.io"
      - key: API_FOOTBALL_TIMEOUT
        value: "15"
      - key: FOOTBALL_DATA_TOKEN
        sync: false
      - key: FOOTBALL_DATA_BASE_URL
        value: "https://api.football-data.org/v4"
      - key: FOOTBALL_DATA_TIMEOUT
        value: "15"
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_CLOUD_API_VERSION
        value: "v20.0"
      - key: WHATSAPP_TEMPLATE_NAME
        value: "daily_prediction_reminder"
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        value: "es"
      - key: WHATSAPP_APP_URL
        sync: false
      - key: WHATSAPP_TIMEOUT
        value: "15"

  - type: cron
    name: gol-master-whatsapp-reminders
    runtime: python
    schedule: "0 13 * * *"
    buildCommand: "./build.sh"
    startCommand: "python manage.py send_whatsapp_morning_reminders"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_CLOUD_API_VERSION
        value: "v20.0"
      - key: WHATSAPP_TEMPLATE_NAME
        value: "daily_prediction_reminder"
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        value: "es"
      - key: WHATSAPP_APP_URL
        sync: false
      - key: WHATSAPP_TIMEOUT
        value: "15"

