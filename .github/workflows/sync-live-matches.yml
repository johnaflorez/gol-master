name: Sync live matches

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sync-live-matches:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DEBUG: "False"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      API_FOOTBALL_BASE_URL: "https://v3.football.api-sports.io"
      API_FOOTBALL_TIMEOUT: "15"
      FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
      FOOTBALL_DATA_BASE_URL: "https://api.football-data.org/v4"
      FOOTBALL_DATA_TIMEOUT: "15"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "https://localhost"
      USE_S3_MEDIA: "False"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live matches sync
        continue-on-error: true
        run: |
          python manage.py sync_live_matches --days-back 1 --days-forward 1 --verbosity 2

      - name: Run football-data.org fallback sync
        if: env.FOOTBALL_DATA_TOKEN != ''
        run: |
          python manage.py sync_football_data --live --days-back 1 --days-forward 1 --verbosity 2

