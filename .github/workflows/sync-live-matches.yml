name: Sync live matches

on:
  schedule:
    # Fallback automático mientras Celery Beat/Worker no estén activos en Render.
    # GitHub scheduled workflows pueden demorarse, pero evitan depender de workers pagos.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-live-matches
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-live-matches:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DEBUG: "False"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
      FOOTBALL_DATA_BASE_URL: "https://api.football-data.org/v4"
      FOOTBALL_DATA_TIMEOUT: "15"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "https://localhost"
      USE_S3_MEDIA: "False"

    steps:
      - name: Print sync context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "scheduled_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "scheduled_at_bogota=$(TZ='America/Bogota' date +'%Y-%m-%dT%H:%M:%S%z')"
          echo "ref=${{ github.ref }}"

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "$SECRET_KEY" ]; then
            echo "::error::SECRET_KEY secret is not configured"
            missing=1
          fi
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not configured"
            missing=1
          fi
          if [ -z "$FOOTBALL_DATA_TOKEN" ]; then
            echo "::error::FOOTBALL_DATA_TOKEN secret is not configured"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run football-data.org live sync
        run: |
          set -o pipefail
          python manage.py sync_football_data --live --days-back 1 --days-forward 1 --fetch-padding-days 1 --no-refresh-scorers --verbosity 2 | tee sync-output.log

      - name: Write sync summary
        if: always()
        run: |
          {
            echo "## Sync live matches"
            echo ""
            echo "- Event: ${{ github.event_name }}"
            echo "- UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Bogotá: $(TZ='America/Bogota' date +'%Y-%m-%dT%H:%M:%S%z')"
            echo ""
            echo "### Command output"
            echo '```text'
            if [ -f sync-output.log ]; then
              cat sync-output.log
            else
              echo "sync-output.log was not generated"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

