name: Sync live matches

on:
  # Fallback manual. The recurring schedule is now owned by Celery Beat in the app.
  workflow_dispatch:

concurrency:
  group: sync-live-matches
  cancel-in-progress: false

jobs:
  sync-live-matches:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DEBUG: "False"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
      FOOTBALL_DATA_BASE_URL: "https://api.football-data.org/v4"
      FOOTBALL_DATA_TIMEOUT: "15"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "https://localhost"
      USE_S3_MEDIA: "False"

    steps:
      - name: Print sync context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "scheduled_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "scheduled_at_bogota=$(TZ='America/Bogota' date +'%Y-%m-%dT%H:%M:%S%z')"
          echo "ref=${{ github.ref }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run football-data.org live sync
        if: env.FOOTBALL_DATA_TOKEN != ''
        run: |
          python manage.py sync_football_data --live --days-back 1 --days-forward 1 --fetch-padding-days 1 --no-refresh-scorers --verbosity 2

