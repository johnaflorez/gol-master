{% load user_extras %}
{% user_avatar_url user as avatar_url %}
{% if avatar_url %}
    <span class="table-user-avatar avatar-clickable" role="button" tabindex="0" aria-label="Ver avatar de {{ user.username }} ampliado" data-avatar-url="{{ avatar_url }}" data-avatar-title="Avatar de {{ user.get_full_name|default:user.username }}">
        <img src="{{ avatar_url }}" alt="Avatar de {{ user.username }}" loading="lazy" decoding="async">
    </span>
{% else %}
    <span class="table-user-avatar" aria-hidden="true">
        <i class="fas fa-user"></i>
    </span>
{% endif %}
